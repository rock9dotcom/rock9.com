<style>
:root{
  --bg:#0e0907;
  --panel:#16110e;
  --line:rgba(255,255,255,0.08);
  --text:#f6efe6;
  --muted:rgba(246,239,230,0.7);
  --gold:#f3bf53;
  --red:#b91d14;
  --radius:28px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#0a0604,#120c09);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  overflow:hidden;
  position:relative;
}

.coin-rain{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}

.coin{
  position:absolute;
  top:-120px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ffe7a3 0%, #f3bf53 45%, #c98512 100%);
  box-shadow:0 0 12px rgba(243,191,83,0.45);
  animation:fall linear infinite;
  opacity:0.9;
}

.coin::after{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.35);
}

@keyframes fall{
  0%{transform:translateY(-120px) rotate(0deg);opacity:0}
  10%{opacity:0.95}
  100%{transform:translateY(120vh) rotate(360deg);opacity:0.2}
}

.top-popup{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:5;
  width:min(340px, calc(100% - 28px));
  background:rgba(28, 28, 30, 0.88);
  border:1px solid rgba(255,255,255,0.07);
  color:#ffffff;
  padding:10px 12px;
  border-radius:16px;
  box-shadow:0 14px 30px rgba(0,0,0,0.28);
  backdrop-filter:blur(16px) saturate(135%);
  -webkit-backdrop-filter:blur(16px) saturate(135%);
  display:flex;
  align-items:flex-start;
  gap:10px;
  animation:slideDown 0.45s ease;
}

.top-popup .gold{
  font-weight:900;
}

.top-popup .close-popup{
  background:none;
  border:none;
  color:rgba(255,255,255,0.48);
  font-size:15px;
  margin-left:2px;
  cursor:pointer;
  line-height:1;
  padding:0;
}

.notification-icon{
  width:28px;
  height:28px;
  border-radius:8px;
  background:linear-gradient(180deg,#d73725,#a5160f);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:900;
  color:#fff;
  flex:0 0 28px;
  box-shadow:0 6px 14px rgba(215,55,37,0.24);
}

.notification-body{
  min-width:0;
  flex:1;
}

.notification-head{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:2px;
}

.notification-app{
  font-size:12px;
  font-weight:700;
  color:rgba(255,255,255,0.92);
}

.notification-time{
  font-size:11px;
  color:rgba(255,255,255,0.5);
  margin-left:auto;
}

.notification-message{
  font-size:12px;
  line-height:1.35;
  color:rgba(255,255,255,0.86);
}

@keyframes slideDown{
  0%{opacity:0;transform:translateX(-50%) translateY(-14px)}
  100%{opacity:1;transform:translateX(-50%) translateY(0)}
}

.wrap{
  width:min(980px,100%);
  position:relative;
  z-index:1;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:32px;
  overflow:hidden;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.content{
  padding:48px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.brand{
  font-size:13px;
  letter-spacing:1px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  font-size:clamp(42px,6vw,72px);
  line-height:1.05;
  font-weight:900;
  margin-bottom:18px;
  text-align:center;
}

.headline{
  display:block;
}

.headline strong{
  font-weight:900;
}

.headline .row{
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:0.35em;
  white-space:nowrap;
  margin:6px 0;
}

.headline .bottom{
  font-size:1.25em;
}

.gold{
  color:var(--gold);
}

.big{
  font-size:inherit;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:16px 24px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  font-size:15px;
  background:linear-gradient(180deg,#d73725,#a5160f);
  color:#fff;
}

.note{
  font-size:13px;
  color:rgba(255,255,255,0.5);
  margin-top:16px;
  text-align:center;
  width:100%;
}

@media(max-width:860px){
  .grid{grid-template-columns:1fr}
  .poster{max-height:420px}
  .content{padding:30px 22px}
  .btn{width:100%}
}
</style>
</head>
